<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Vuelos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Dashboard de Vuelos</h1>
    <div id="dashboard">
        <div class="stat">
            <h2>Kilómetros Acumulados</h2>
            <p id="total-km">0 km</p>
        </div>
        <div class="stat">
            <h2>Destinos Más Frecuentes</h2>
            <ul id="frequent-destinations"></ul>
        </div>
        <div class="stat">
            <h2>Países Visitados</h2>
            <ul id="visited-countries"></ul>
        </div>
    </div>

    <!-- Mapa Full Width -->
    <div id="map-container">
        <h2>Mapa Interactivo de Vuelos</h2>
        <div id="map"></div>
    </div>

    <!-- Agregar Vuelo -->
    <div id="add-flight">
        <h2>Agregar Vuelo</h2>
        <form id="flight-form">
            <label for="origin">Origen:</label>
            <input type="text" id="origin" required><br>
            <label for="destination">Destino:</label>
            <input type="text" id="destination" required><br>
            <label for="distance">Distancia (km):</label>
            <input type="number" id="distance" required><br>
            <label for="date">Fecha:</label>
            <input type="date" id="date" required><br>
            <label for="country">País:</label>
            <input type="text" id="country" required><br>
            <button type="submit">Agregar Vuelo</button>
        </form>
        <button id="load-sample">Cargar Datos de Ejemplo</button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyB1EeHfOKQ8QSUXAC2b6N7rJcoJaQVFfTA",
            authDomain: "flightracker-f5493.firebaseapp.com",
            projectId: "flightracker-f5493",
            storageBucket: "flightracker-f5493.firebasestorage.app",
            messagingSenderId: "712197361322",
            appId: "1:712197361322:web:7d7cfaa410eca80c5b8ad3",
            measurementId: "G-QZ5VTMWJCY"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        window.db = db;
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html></content>
